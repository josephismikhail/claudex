name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          CHANGELOG: ${{ steps.changelog.outputs.content }}
        run: |
          gh release create "$TAG" --draft --title "$TAG" --notes "$CHANGELOG"

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-14
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libsecret-1-dev
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            sudo apt-get install -y musl-tools
          fi

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with cross
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build native
        if: matrix.cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Unix
        if: runner.os != 'Windows'
        env:
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../claudex-${TAG}-${{ matrix.target }}.tar.gz claudex

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          $asset = "claudex-$env:TAG-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/claudex.exe" -DestinationPath $asset

      - name: Generate SHA-256 checksum
        shell: pwsh
        env:
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          $extension = if ($IsWindows) { "zip" } else { "tar.gz" }
          $asset = "claudex-$env:TAG-${{ matrix.target }}.$extension"
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $asset).Hash.ToLowerInvariant()
          "$hash  $asset" | Set-Content -NoNewline -LiteralPath "$asset.sha256"

      - name: Upload
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          $extension = if ($IsWindows) { "zip" } else { "tar.gz" }
          $asset = "claudex-$env:TAG-${{ matrix.target }}.$extension"
          gh release upload $env:TAG $asset "$asset.sha256"

  publish-release:
    name: Publish Release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: gh release edit "$TAG" --draft=false
